<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escaneo de Red — Depósito</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; font-family:Arial,sans-serif; color:#eee; min-height:100vh; }

#header {
  background:#16213e; padding:12px 20px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:2px solid #0f3460; gap:12px; flex-wrap:wrap;
}
#header h1 { font-size:1.2em; color:#e94560; }
#header a {
  background:#0f3460; border:1px solid #e94560; color:#fff;
  padding:6px 14px; border-radius:4px; font-size:0.85em; text-decoration:none;
}
#header a:hover { background:#e94560; }

#main { max-width:1100px; margin:28px auto; padding:0 20px; display:flex; flex-direction:column; gap:22px; }

.card { background:#16213e; border:1px solid #0f3460; border-radius:8px; padding:20px; }
.card h2 { font-size:0.95em; color:#e94560; margin-bottom:16px; text-transform:uppercase; letter-spacing:0.05em; }

/* Scan form */
#scan-form { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group label { font-size:0.78em; color:#aaa; }
.form-group input, .form-group select {
  background:#0f3460; border:1px solid #1a4a8a; color:#eee;
  padding:8px 10px; border-radius:4px; font-size:0.88em; outline:none; min-width:200px;
}
.form-group input:focus, .form-group select:focus { border-color:#e94560; }
.form-group select option { background:#0f3460; }
.btn-primary {
  background:#e94560; border:none; color:#fff;
  padding:9px 22px; border-radius:4px; cursor:pointer;
  font-size:0.88em; font-weight:bold; transition:background 0.15s; white-space:nowrap;
}
.btn-primary:hover { background:#c0002a; }
.btn-primary:disabled { background:#555; cursor:not-allowed; }
.btn-secondary {
  background:#0f3460; border:1px solid #e94560; color:#fff;
  padding:9px 18px; border-radius:4px; cursor:pointer;
  font-size:0.88em; transition:background 0.15s; white-space:nowrap;
}
.btn-secondary:hover { background:#e94560; }

.deep-label { display:flex; align-items:center; gap:7px; font-size:0.85em; color:#aaa; cursor:pointer; padding-bottom:2px; }
.deep-label input { width:16px; height:16px; cursor:pointer; accent-color:#e94560; }

/* Progress */
#scan-progress { display:none; margin-top:14px; }
.progress-bar-wrap { background:#0a1628; border-radius:4px; height:6px; overflow:hidden; margin-top:8px; }
.progress-bar { height:100%; background:linear-gradient(90deg,#e94560,#0f3460); border-radius:4px; transition:width 0.4s; }
#scan-status-text { font-size:0.82em; color:#aaa; margin-top:6px; }

/* Results table */
#results-section { display:none; }
#results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
#results-header h2 { margin:0; }
#results-actions { display:flex; gap:10px; flex-wrap:wrap; }

.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.82em; }
thead th {
  background:#0f3460; color:#e94560; padding:9px 10px;
  text-align:left; font-size:0.78em; text-transform:uppercase;
  letter-spacing:0.05em; white-space:nowrap;
}
tbody tr { border-bottom:1px solid #0f1a30; transition:background 0.1s; }
tbody tr:hover { background:#0f1a30; }
tbody td { padding:9px 10px; color:#ccc; vertical-align:middle; }
tbody td .ip { font-family:monospace; color:#eee; font-weight:bold; }
tbody td .mac { font-family:monospace; font-size:0.9em; color:#aaa; }
tbody td .ports-list { font-size:0.8em; color:#888; max-width:180px; }
.port-badge {
  display:inline-block; background:#0f3460; border:1px solid #1a4a8a;
  border-radius:3px; padding:1px 5px; margin:1px; font-size:0.78em;
  color:#bbb; white-space:nowrap;
}
.tipo-badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:0.75em; font-weight:bold; white-space:nowrap;
}
.check-col { width:36px; text-align:center; }
input[type=checkbox] { accent-color:#e94560; width:15px; height:15px; cursor:pointer; }

.edit-label { background:none; border:none; color:#eee; font-size:0.9em; cursor:text; width:100%; }
.edit-tipo { background:#0f3460; border:1px solid #1a4a8a; color:#eee; font-size:0.82em; border-radius:3px; padding:3px 6px; outline:none; }
.edit-tipo:focus { border-color:#e94560; }
.edit-capa { background:#0f3460; border:1px solid #1a4a8a; color:#eee; font-size:0.82em; border-radius:3px; padding:3px 6px; outline:none; }

/* Status dot */
.dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }
.dot-up { background:#00cc88; }

/* Added badge */
.badge-added { color:#00cc88; font-size:0.75em; font-weight:bold; white-space:nowrap; }

/* Type colors */
.t-router    { background:rgba(68,136,255,0.15); color:#4488ff; border:1px solid #4488ff44; }
.t-switch    { background:rgba(68,136,255,0.15); color:#88aaff; border:1px solid #88aaff44; }
.t-ap        { background:rgba(0,204,136,0.15);  color:#00cc88; border:1px solid #00cc8844; }
.t-camara    { background:rgba(255,68,68,0.15);  color:#ff4444; border:1px solid #ff444444; }
.t-fw        { background:rgba(255,136,0,0.15);  color:#ff8800; border:1px solid #ff880044; }
.t-server    { background:rgba(204,68,255,0.15); color:#cc44ff; border:1px solid #cc44ff44; }
.t-pc        { background:rgba(200,200,200,0.1); color:#aaa;    border:1px solid #aaa4; }
.t-printer   { background:rgba(255,204,0,0.15);  color:#ffcc00; border:1px solid #ffcc0044; }
.t-default   { background:rgba(100,100,100,0.1); color:#888;    border:1px solid #8884; }

/* Empty/error states */
#no-results { color:#555; font-size:0.88em; padding:20px 0; }
#scan-error { display:none; background:rgba(233,69,96,0.12); border:1px solid #e94560; color:#e94560; border-radius:5px; padding:10px 14px; font-size:0.85em; margin-top:12px; }

/* Spinner */
.spinner { display:inline-block; width:16px; height:16px; border:2px solid #333; border-top-color:#e94560; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="header">
  <h1>&#128268; Escaneo de Red</h1>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <a href="plano.html">&#8592; Volver al plano</a>
    <a href="iconos.html">Iconos</a>
  </div>
</div>

<div id="main">

  <!-- Scan config -->
  <div class="card">
    <h2>Configuración del escaneo</h2>
    <div id="scan-form">
      <div class="form-group">
        <label>Red detectada</label>
        <select id="select-iface" onchange="setTargetFromIface()">
          <option value="">Cargando...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Target (IP, rango o CIDR)</label>
        <input type="text" id="input-target" placeholder="192.168.1.0/24">
      </div>
      <div class="form-group">
        <label>Capa destino</label>
        <select id="select-capa">
          <option value="">Sin capa</option>
        </select>
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <label class="deep-label">
          <input type="checkbox" id="check-deep">
          Escaneo profundo (OS + puertos)
        </label>
      </div>
      <button class="btn-primary" id="btn-scan" onclick="startScan()">&#128269; Escanear</button>
    </div>

    <div id="scan-error"></div>

    <div id="scan-progress">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="spinner"></span>
        <span id="scan-status-text">Iniciando escaneo...</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:5%"></div></div>
      <div style="font-size:0.75em;color:#555;margin-top:6px;">El escaneo puede tardar hasta 2 minutos según la red.</div>
    </div>
  </div>

  <!-- Results -->
  <div class="card" id="results-section">
    <div id="results-header">
      <h2>Dispositivos encontrados <span id="results-count" style="color:#aaa;font-weight:normal;text-transform:none;letter-spacing:0;"></span></h2>
      <div id="results-actions">
        <button class="btn-secondary" onclick="toggleSelectAll()">Seleccionar todo</button>
        <button class="btn-primary" onclick="addSelected()">&#43; Agregar seleccionados al plano</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="results-table">
        <thead>
          <tr>
            <th class="check-col"><input type="checkbox" id="check-all" onchange="toggleSelectAll(this.checked)"></th>
            <th>IP</th>
            <th>MAC / Fabricante</th>
            <th>Hostname</th>
            <th>SO</th>
            <th>Tipo</th>
            <th>Puertos abiertos</th>
            <th>Label en plano</th>
            <th>Capa</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
      <div id="no-results" style="display:none;">No se encontraron dispositivos.</div>
    </div>
  </div>

</div>

<script>
let scanResults = [];
let capas = [];

const TIPO_CLASS = {
  'Router/Switch': 't-router', 'Access Point': 't-ap', 'Cámara IP': 't-camara',
  'Firewall': 't-fw', 'Servidor': 't-server', 'Servidor Web': 't-server',
  'PC': 't-pc', 'Impresora': 't-printer', 'Desconocido': 't-default'
};

async function init() {
  // Load interfaces
  try {
    const res = await fetch('/api/scan.php');
    const ifaces = await res.json();
    const sel = document.getElementById('select-iface');
    sel.innerHTML = '<option value="">-- Seleccionar red --</option>';
    for (const i of ifaces) {
      const opt = document.createElement('option');
      opt.value = i.cidr;
      // Convert to network CIDR (remove host part)
      opt.textContent = `${i.iface} — ${i.cidr}`;
      sel.appendChild(opt);
    }
    if (ifaces.length) {
      sel.value = ifaces[0].cidr;
      setTargetFromIface();
    }
  } catch(e) { console.error(e); }

  // Load capas
  try {
    const res = await fetch('/api/capas.php');
    capas = await res.json();
    const sel = document.getElementById('select-capa');
    sel.innerHTML = '<option value="">Sin capa</option>';
    for (const c of capas) {
      sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
    }
    // Pre-select "Red" if exists
    const red = capas.find(c => c.nombre === 'Red');
    if (red) sel.value = red.id;
  } catch(e) { console.error(e); }
}

function setTargetFromIface() {
  const val = document.getElementById('select-iface').value;
  if (!val) return;
  // Convert host address to network: e.g. 192.168.14.133/24 → 192.168.14.0/24
  const [ip, prefix] = val.split('/');
  const parts = ip.split('.').map(Number);
  const prefixLen = parseInt(prefix);
  const mask = prefixLen >= 24 ? [255,255,255,0] :
               prefixLen >= 16 ? [255,255,0,0] : [255,0,0,0];
  const net = parts.map((p,i) => p & mask[i]);
  document.getElementById('input-target').value = `${net.join('.')}/${prefixLen}`;
}

async function startScan() {
  const target = document.getElementById('input-target').value.trim();
  if (!target) { showError('Ingresá un target de red.'); return; }

  const deep = document.getElementById('check-deep').checked;
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  document.getElementById('scan-error').style.display = 'none';
  document.getElementById('scan-progress').style.display = 'block';
  document.getElementById('results-section').style.display = 'none';

  // Animate progress bar
  let pct = 5;
  const interval = setInterval(() => {
    pct = Math.min(pct + (deep ? 1 : 3), 90);
    document.getElementById('progress-bar').style.width = pct + '%';
    const msgs = deep
      ? ['Descubriendo hosts...','Detectando OS...','Escaneando puertos...','Identificando servicios...','Procesando resultados...']
      : ['Enviando pings...','Detectando MACs...','Resolviendo hostnames...','Procesando resultados...'];
    document.getElementById('scan-status-text').textContent = msgs[Math.min(Math.floor(pct/25), msgs.length-1)];
  }, deep ? 2000 : 800);

  try {
    const res = await fetch('/api/scan.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target, deep })
    });
    const data = await res.json();
    clearInterval(interval);
    document.getElementById('progress-bar').style.width = '100%';

    if (!res.ok || data.error) {
      showError(data.error || 'Error en el escaneo');
    } else {
      scanResults = data.hosts || [];
      renderResults();
    }
  } catch(e) {
    clearInterval(interval);
    showError('Error de red: ' + e.message);
  } finally {
    btn.disabled = false;
    document.getElementById('scan-progress').style.display = 'none';
  }
}

function renderResults() {
  const section = document.getElementById('results-section');
  const tbody   = document.getElementById('results-body');
  const noRes   = document.getElementById('no-results');
  section.style.display = 'block';
  document.getElementById('results-count').textContent = `(${scanResults.length})`;

  if (!scanResults.length) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  // Build capa options for each row
  const capaOpts = '<option value="">Sin capa</option>' +
    capas.map(c => `<option value="${c.id}"${c.nombre==='Red'?' selected':''}>${c.nombre}</option>`).join('');
  const capaDefault = document.getElementById('select-capa').value;

  tbody.innerHTML = '';
  for (let i = 0; i < scanResults.length; i++) {
    const h = scanResults[i];
    const tipoClass = TIPO_CLASS[h.tipo] || 't-default';
    const portsBadges = h.ports.slice(0, 8).map(p =>
      `<span class="port-badge">${p.port}/${p.proto}${p.service?' '+p.service:''}</span>`
    ).join('') + (h.ports.length > 8 ? `<span class="port-badge">+${h.ports.length-8}</span>` : '');

    const tr = document.createElement('tr');
    tr.id = `row-${i}`;
    tr.innerHTML = `
      <td class="check-col"><input type="checkbox" class="row-check" data-idx="${i}" checked></td>
      <td><span class="dot dot-up"></span><span class="ip">${h.ip}</span></td>
      <td>
        <div class="mac">${h.mac || '—'}</div>
        <div style="font-size:0.78em;color:#666;margin-top:2px;">${h.vendor || ''}</div>
      </td>
      <td style="font-size:0.85em;color:#bbb;">${h.hostname || '—'}</td>
      <td style="font-size:0.78em;color:#aaa;max-width:150px;overflow:hidden;text-overflow:ellipsis;" title="${h.os}">${h.os || '—'}</td>
      <td>
        <select class="edit-tipo" data-idx="${i}" onchange="scanResults[this.dataset.idx].tipo=this.value">
          ${buildTipoOpts(h.tipo)}
        </select>
      </td>
      <td class="ports-list">${portsBadges || '—'}</td>
      <td><input type="text" class="edit-label" data-idx="${i}" value="${escHtml(h.label)}" onchange="scanResults[this.dataset.idx].label=this.value" placeholder="Label"></td>
      <td>
        <select class="edit-capa" data-idx="${i}" onchange="scanResults[this.dataset.idx]._capa_id=this.value">
          ${capaOpts.replace(`value="${capaDefault}"`, `value="${capaDefault}" selected`)}
        </select>
      </td>
      <td><span id="added-${i}"></span></td>
    `;
    tbody.appendChild(tr);
    // Set default capa
    scanResults[i]._capa_id = capaDefault;
    tr.querySelector('.edit-capa').addEventListener('change', function(){
      scanResults[parseInt(this.dataset.idx)]._capa_id = this.value;
    });
  }
}

function buildTipoOpts(selected) {
  const tipos = ['Router/Switch','Switch','Access Point','Cámara IP','DVR','Firewall','Servidor','Servidor Web','PC','Laptop','Impresora','Dispositivo móvil','Desconocido'];
  return tipos.map(t => `<option value="${t}"${t===selected?' selected':''}>${t}</option>`).join('');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}

function toggleSelectAll(val) {
  const checks = document.querySelectorAll('.row-check');
  const newVal = (val !== undefined) ? val : !checks[0]?.checked;
  checks.forEach(c => c.checked = newVal);
  document.getElementById('check-all').checked = newVal;
}

async function addSelected() {
  const checks = document.querySelectorAll('.row-check:checked');
  if (!checks.length) { alert('Seleccioná al menos un dispositivo.'); return; }

  const btn = document.querySelector('[onclick="addSelected()"]');
  btn.disabled = true;
  btn.textContent = 'Agregando...';

  // Get canvas dimensions to spread elements
  let x = 200, y = 200;
  const step = 120;
  const cols = 8;
  let col = 0;

  for (const check of checks) {
    const idx = parseInt(check.dataset.idx);
    const h = scanResults[idx];

    // Find matching icon by tipo
    const iconoId = await findIconByTipo(h.tipo);

    // Build propiedades
    const props = {
      ip:          h.ip,
      mac:         h.mac,
      so:          h.os,
      version:     h.ports.find(p=>p.version)?.version || '',
      puertos:     h.ports.map(p=>`${p.port}/${p.proto}${p.service?' '+p.service:''}`).join(', '),
      descripcion: h.hostname || h.vendor || '',
      tipo:        h.tipo,
      estado:      'activo'
    };

    try {
      const res = await fetch('/api/elementos.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          icono_id:   iconoId,
          label:      h.label || h.ip,
          x:          x + (col % cols) * step,
          y:          y + Math.floor(col / cols) * step,
          capa_id:    h._capa_id || null,
          propiedades: props
        })
      });
      const data = await res.json();
      if (data.id) {
        document.getElementById(`added-${idx}`).innerHTML =
          `<span class="badge-added">✓ Agregado</span>`;
        check.checked = false;
        check.disabled = true;
        col++;
      }
    } catch(e) {
      document.getElementById(`added-${idx}`).innerHTML =
        `<span style="color:#e94560;font-size:0.75em;">Error</span>`;
    }
  }

  btn.disabled = false;
  btn.textContent = '+ Agregar seleccionados al plano';
}

async function findIconByTipo(tipo) {
  // Try to fetch icons and match by name
  try {
    const res = await fetch('/api/iconos.php');
    const iconos = await res.json();
    const map = {
      'Router/Switch': ['router','switch'], 'Switch': ['switch'],
      'Access Point': ['access','ap','wifi'],
      'Cámara IP': ['camara','camera','cam'],
      'DVR': ['dvr'], 'Firewall': ['firewall','fw'],
      'Servidor': ['server','servidor'], 'Servidor Web': ['server','servidor'],
      'PC': ['pc','computer'], 'Laptop': ['laptop','notebook'],
      'Impresora': ['impresora','printer']
    };
    const keywords = map[tipo] || [];
    for (const kw of keywords) {
      const found = iconos.find(i => i.nombre.toLowerCase().includes(kw) || i.archivo.toLowerCase().includes(kw));
      if (found) return found.id;
    }
  } catch(e) {}
  return null;
}

function showError(msg) {
  const el = document.getElementById('scan-error');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

init();
</script>
</body>
</html>
